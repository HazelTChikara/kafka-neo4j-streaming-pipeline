apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-neo4j-connector
  labels:
    app: kafka-neo4j-connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-neo4j-connector
  template:
    metadata:
      labels:
        app: kafka-neo4j-connector
    spec:
      containers:
        - name: kafka-connect
          image: change1472/cse511-kafka-neo4j-connector:arm64
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash"]
          args: 
            - "-c"
            - |
              # Start Kafka Connect in background
              /etc/confluent/docker/run &
              
              # Wait for Kafka Connect to be ready
              echo "Waiting for Kafka Connect to start..."
              while ! curl -s http://localhost:8083/connectors > /dev/null; do
                sleep 5
              done
              
              # Configure internal topics
              for topic in _connect-offsets _connect-configs _connect-status; do
                kafka-configs --bootstrap-server kafka-service:29092 --alter --topic $topic --delete-config cleanup.policy 2>/dev/null || true
                kafka-configs --bootstrap-server kafka-service:29092 --alter --topic $topic --add-config cleanup.policy=compact
              done
              
              # Create Neo4j connector
              curl -X POST http://localhost:8083/connectors/ -H "Content-Type:application/json" -d '{
                "name": "Neo4jSinkConnectorJSONString",
                "config": {
                  "topics": "nyc_taxicab_data",
                  "connector.class": "org.neo4j.connectors.kafka.sink.Neo4jConnector",
                  "key.converter": "org.apache.kafka.connect.json.JsonConverter",
                  "key.converter.schemas.enable": false,
                  "value.converter": "org.apache.kafka.connect.json.JsonConverter",
                  "value.converter.schemas.enable": false,
                  "errors.retry.timeout": "-1",
                  "errors.retry.delay.max.ms": "1000",
                  "errors.tolerance": "all",
                  "errors.log.enable": true,
                  "errors.log.include.messages": true,
                  "neo4j.uri": "bolt://my-neo4j-release:7687",
                  "neo4j.authentication.type": "BASIC",
                  "neo4j.authentication.basic.username": "neo4j",
                  "neo4j.authentication.basic.password": "processingpipeline",
                  "neo4j.cypher.topic.nyc_taxicab_data": "MERGE (p:Location {name: toInteger(event.PULocationID)}) MERGE (d:Location {name: toInteger(event.DOLocationID)}) MERGE (p)-[:TRIP {distance: toFloat(event.trip_distance), fare: toFloat(event.fare_amount)}]->(d)"
                }
              }'
              
              # Keep container running
              tail -f /dev/null
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: "kafka-service:29092"
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_GROUP_ID
              value: "kafka-connect-group"
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "_connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "_connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "_connect-status"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: "kafka-connect-service"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_PLUGIN_PATH
              value: "/usr/share/java,/usr/share/confluent-hub-components"
          resources:
            requests:
              memory: "1500Mi"
              cpu: "500m"
            limits:
              memory: "2000Mi"
              cpu: "1500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect-service
spec:
  selector:
    app: kafka-neo4j-connector
  ports:
  - protocol: TCP
    port: 8083
    targetPort: 8083
